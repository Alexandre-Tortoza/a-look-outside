paths:
  raw_dataset_directory: dataset/raw
  processed_dataset_directory: dataset/processed
  machine_learning_run_directory: machine-learning/runs
  machine_learning_computer_configuration_file: machine-learning/my-computer.yaml
  documentation_directory: docs
  xai_output_directory: docs/xai

random_seed: 42

class_names:
  sdss:
    - disk_face_on_no_spiral          # 0
    - smooth_completely_round         # 1
    - smooth_in_between_round         # 2
    - smooth_cigar_shaped             # 3
    - disk_edge_on_rounded_bulge      # 4
    - disk_edge_on_boxy_bulge         # 5
    - disk_edge_on_no_bulge           # 6
    - disk_face_on_tight_spiral       # 7
    - disk_face_on_medium_spiral      # 8
    - disk_face_on_loose_spiral       # 9
  decals:
    - disturbed                       # 0
    - merging                         # 1
    - round_smooth                    # 2
    - in_between_round_smooth         # 3
    - cigar_shaped_smooth             # 4
    - barred_spiral                   # 5
    - unbarred_tight_spiral           # 6
    - unbarred_loose_spiral           # 7
    - edge_on_no_bulge                # 8
    - edge_on_with_bulge              # 9

training:
  epoch_count: 50
  early_stopping_patience: 8
  batch_size: 32
  image_size: 224
  random_seed: 42
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4

models:
  dino:
    model_name: vit_small_patch14_dinov2
    pretrained: true
    fine_tuning:
      backbone_learning_rate: 3.0e-5
      head_learning_rate: 3.0e-4
      weight_decay: 5.0e-2
      label_smoothing: 5.0e-2
      class_weighting: sqrt_inverse_frequency
      scheduler_factor: 0.5
      scheduler_patience: 2
      minimum_learning_rate: 1.0e-6
  k_nearest_neighbors:
    n_neighbors: 5
    mode: pixels

evaluation:
  misclassified_samples_per_pair: 10
  top_k_values: [3, 5]
  calibration_bin_count: 10

leaderboard:
  primary_metric: balanced_accuracy
  secondary_metric: accuracy
  jsonl_filename: runs.jsonl
  heatmap_metrics:
    - accuracy
    - balanced_accuracy
    - macro_f1
    - cohen_kappa
    - matthews_correlation_coefficient
    - roc_auc_macro
    - log_loss

dataset_analysis:
  output_directory: docs/dataset
  sample_count_per_class: 5
  intensity_histogram_bin_count: 64

benchmarks:
  galaxy_full:
    description: "Galaxy10 full baseline — 5 modelos x 4 variantes"
    datasets:
      sources: [sdss]
      include_raw: true
      balancing_variants:
        - methods: [smote]
        - methods: [random_under_sampling]
        - methods: [smote, random_under_sampling]
    models: [dino, vgg16, efficientnet, resnet50, k_nearest_neighbors]
    knn_modes: [pixels, features]
    generate_dataset_analysis: true
    generate_xai: true
    generate_recommendations: true

  smoke:
    description: "Smoke test rapido (KNN pixels + ResNet50, sem variantes)"
    datasets:
      sources: [sdss]
      include_raw: true
      balancing_variants: []
    models: [k_nearest_neighbors, resnet50]
    knn_modes: [pixels]
    generate_dataset_analysis: false
    generate_xai: false
    generate_recommendations: true

pipelines:
  baseline:
    model_names:
      - dino
      - vgg16
      - efficientnet
      - resnet50
      - k_nearest_neighbors
    dataset_names:
      - sdss_raw
      - decals_raw
      - sdss_smote
      - decals_smote

xai:
  default_methods:
    - gradient_class_activation_mapping
    - nearest_neighbors
  knn:
    panel_neighbor_count: 5
