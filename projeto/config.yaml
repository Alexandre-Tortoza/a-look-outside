# ============================================================
# RECURSOS DE HARDWARE
# ============================================================
recursos:
  dispositivo: "auto"             # "auto" | "cuda" | "cuda:0" | "cuda:1" | "cpu"
  max_gpu_memoria_gb: null        # null = sem limite, ou ex: 8.0 para cap de VRAM
  num_workers: 4                  # workers do DataLoader (null = auto: min(cpu_count, 8))
  pin_memory: true
  mixed_precision: true           # AMP automatico quando em GPU
  max_batch_em_memoria: null      # null = usa batch_size do modelo, ou valor para cap

# ============================================================
# GLOBAL — aplica a todos os modelos, sobrescrito por secao especifica
# ============================================================
global:
  seed: 42
  epocas: 50
  batch_size: 32
  tamanho_imagem: 224
  paciencia_early_stop: 10
  scheduler_ativo: true
  peso_decay: 1.0e-4
  salvar_pesos: true
  habilitar_xai: false

# ============================================================
# XAI — configuracoes de explicabilidade
# ============================================================
xai:
  amostras_por_classe: 50      # maximo de imagens por classe para grade
  imagens_por_linha: 10        # colunas na grade visual
  diretorio_saida: "docs/xai"  # raiz de saida (subpasta = nome do modelo)

# ============================================================
# MODELOS — herda do global, sobrescreve o que precisar
# ============================================================
modelos:
  cnn:
    lr: 1.0e-3

  resnet50:
    lr_cabeca: 1.0e-3
    lr_backbone: 5.0e-5          # reduzido de 1e-4 para ganho fino
    epocas_congelado: 5
    pretrained: true
    label_smoothing: 0.1

  efficientnet:
    lr_cabeca: 1.0e-3
    lr_backbone: 1.0e-4
    epocas_congelado: 5
    variante_backbone: "efficientnet_b0"
    pretrained: true

  vgg16:
    lr_cabeca: 1.0e-3
    lr_backbone: 1.0e-4
    epocas_congelado: 5
    batch_size: 16                # VGG16 pesado, batch menor
    pretrained: true
    paciencia_early_stop: 5       # early stop agressivo (custo alto)
    label_smoothing: 0.05
    distilacao_temperatura: 4.0   # temperatura para knowledge distillation
    distilacao_alpha: 0.7         # peso da soft loss (0=só hard, 1=só soft)

  vit:
    lr_cabeca: 1.0e-3
    lr_backbone: 1.0e-5
    epocas_congelado: 10
    backbone: "vit_base_patch16_224"
    pretrained: true
    drop_path_rate: 0.1           # stochastic depth
    rand_augment: true            # RandAugment no treino
    mixup_alpha: 0.8              # MixUp por batch
    cutmix_alpha: 1.0             # CutMix por batch (alternado com MixUp)
    label_smoothing: 0.1

  dino:
    modo: "hub"                   # "hub" | "pre_treino"
    backbone: "dinov2_vitb14"
    lr_cabeca: 1.0e-3
    lr_backbone: 5.0e-6           # reduzido de 1e-5 para evitar degradação
    epocas_congelado: 5
    label_smoothing: 0.1
    cabeca_mlp: true              # MLP head (Linear→GELU→Dropout→Linear)
    # pre-treino (so usado se modo == "pre_treino")
    epocas_pre_treino: 100
    epocas_ajuste_fino: 30
    tamanho_projecao: 65536
    temperatura_professor: 0.04
    temperatura_aluno: 0.1

  multimodal:
    lr_cabeca: 1.0e-3
    lr_backbone: 1.0e-4
    epocas_congelado: 5
    dim_visual: 256
    dim_tabular: 256
    dim_fusao: 512
    dropout_fusao: 0.4
    dropout_tabular: 0.3
    features_tabulares: ["ra", "dec", "redshift", "mag_r", "mag_g", "mag_z"]
    pretrained: true

# ============================================================
# EXPERIMENTOS — combinacoes pre-definidas para rodar via CLI
# ============================================================
experimentos:
  baseline_decals:
    modelos: [cnn, resnet50, efficientnet, vgg16, vit, dino]
    datasets: [decals]
    versao_dataset: raw

  baseline_sdss:
    modelos: [cnn, resnet50, efficientnet, vgg16, vit]
    datasets: [sdss]
    versao_dataset: raw

  balanceado_smote:
    modelos: [cnn, resnet50, vit]
    datasets: [decals]
    versao_dataset: smote

  balanceado_undersampling:
    modelos: [cnn, resnet50, vit]
    datasets: [decals]
    versao_dataset: undersampling

  aumento_dados:
    modelos: [cnn, resnet50, vit]
    datasets: [decals]
    versao_dataset: aumento

  cross_sdss_para_decals:
    modelos: [resnet50, vit]
    treinar_em: sdss
    avaliar_em: decals
    versao_dataset: raw

  cross_decals_para_sdss:
    modelos: [resnet50, vit]
    treinar_em: decals
    avaliar_em: sdss
    versao_dataset: raw

  # ── Top-3 otimizado ─────────────────────────────────────────────────
  top3_otimizado:
    modelos: [resnet50, vit, dino]
    datasets: [decals]
    versao_dataset: raw

  # ── Busca de epocas_congelado para ResNet50 (ec=5 já é o default) ──
  resnet50_busca_ec3:
    modelos: [resnet50]
    datasets: [decals]
    versao_dataset: raw
    epocas_congelado: 3

  resnet50_busca_ec8:
    modelos: [resnet50]
    datasets: [decals]
    versao_dataset: raw
    epocas_congelado: 8

  # ── VGG16 com knowledge distillation (professor = ResNet50) ─────────
  vgg16_distilacao:
    modelos: [vgg16]
    datasets: [decals]
    versao_dataset: raw
    modo_treino: distilacao

  # ── Pipeline estado da arte — cross-dataset ──────────────────────────
  cross_sdss_para_decals:
    modelos: [vgg16]
    treinar_em: sdss
    versao_dataset: hibrido
    avaliar_em: decals

  cross_decals_para_sdss:
    modelos: [vgg16]
    treinar_em: decals
    versao_dataset: raw
    avaliar_em: sdss

  # ── Dataset fusao (SDSS + DECaLS, somente imagens) ───────────────────
  vgg16_fusao:
    modelos: [vgg16]
    datasets: [fusao]
    versao_dataset: raw
